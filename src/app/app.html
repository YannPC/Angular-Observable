<div class="container-button">
  <button (click)="GetAsynData()">Get Data</button>
  <button (click)="StopAsyncData()">Stop Data</button>
  <button (click)="RefreshData()">Refresh Data</button>
</div>
<div class="container">
  <h2>Obsersable in Angular</h2>
  <p *ngIf="loading">Loading...</p>

  <div class="data-list" *ngFor="let item of data">
    {{ item }}
  </div>
</div>
